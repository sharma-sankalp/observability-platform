global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - alerts.yaml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: kubernetes-services
    kubernetes_sd_configs:
      - role: endpoints

  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod